{% extends "base.html" %}

{% block title %}File Renamer{% endblock %}

{% block content %}
<h1 class="mb-4"><i class="fas fa-i-cursor me-2"></i>File Renamer</h1>

<div class="card">
    <div class="card-body">
        <form method="POST">
            <div class="mb-3">
                <label for="folder_path" class="form-label">Folder Path <span class="text-danger">*</span></label>
                <input type="text" class="form-control" id="folder_path" name="folder_path" value="{{ default_folder }}" required placeholder="C:/Users/YourName/Downloads">
                <small class="text-muted">Enter the full path to the folder containing files to rename</small>
            </div>
            
            <div class="row">
                <div class="col-md-6 mb-3">
                    <label for="prefix" class="form-label">Prefix</label>
                    <input type="text" class="form-control" id="prefix" name="prefix" placeholder="e.g., Project_">
                </div>
                <div class="col-md-6 mb-3">
                    <label for="suffix" class="form-label">Suffix</label>
                    <input type="text" class="form-control" id="suffix" name="suffix" placeholder="e.g., _final">
                </div>
            </div>
            
            <div class="row">
                <div class="col-md-6 mb-3">
                    <div class="form-check">
                        <input class="form-check-input" type="checkbox" id="numbering" name="numbering" checked>
                        <label class="form-check-label" for="numbering">
                            Add sequential numbering
                        </label>
                    </div>
                </div>
                <div class="col-md-6 mb-3">
                    <label for="start_num" class="form-label">Start Number</label>
                    <input type="number" class="form-control" id="start_num" name="start_num" value="1" min="1">
                </div>
            </div>
            
            <div class="mb-3">
                <div class="form-check">
                    <input class="form-check-input" type="checkbox" id="remove_special" name="remove_special" checked>
                    <label class="form-check-label" for="remove_special">
                        Remove special characters (keeps letters, numbers, underscores, hyphens)
                    </label>
                </div>
            </div>
            
            <div class="mb-3">
                <div class="form-check">
                    <input class="form-check-input" type="checkbox" id="include_subdirs" name="include_subdirs">
                    <label class="form-check-label" for="include_subdirs">
                        Include subdirectories
                    </label>
                </div>
            </div>
            
            <div class="alert alert-info">
                <i class="fas fa-info-circle"></i> Example: If you have "photo.jpg", prefix="IMG_", suffix="_edit", numbering=True → "IMG_photo_edit_001.jpg"
            </div>
            
            <button type="submit" class="btn btn-primary">
                <i class="fas fa-play me-2"></i>Start Renaming
            </button>
        </form>
    </div>
</div>
{% endblock %}
